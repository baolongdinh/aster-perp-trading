bot:
  dry_run: false # ⚠️ Set to false only when ready for live trading

exchange:
  # Your Aster API Key (from exchange dashboard -> API Management)
  # (also set via env: ASTER_EXCHANGE_API_KEY)
  api_key: ""
  # Private key: NEVER set here — use env var ASTER_API_SECRET only
  futures_rest_base: "https://fapi.asterdex.com"
  futures_ws_base: "wss://fstream.asterdex.com"
  recv_window: 5000
  requests_per_second: 5

risk:
  max_position_usdt: 2000
  max_open_positions: 5
  max_global_pending_limit_orders: 10
  max_pending_per_side: 2
  daily_loss_limit_usdt: 25
  risk_per_trade_usdt: 5 # Risk $5 per trade (loss on SL hit)
  atr_multiplier: 2.0 # SL distance = 2 * ATR
  per_trade_stop_loss_pct: 2.0
  per_trade_take_profit_pct: 4.0 # 1:2 Risk-Reward ratio as default
  position_mode: one_way # one_way | hedge

api:
  host: "0.0.0.0"
  port: 8080

log:
  level: info # debug | info | warn | error
  file: "logs/bot.log"

strategies:
  - name: ema_cross
    enabled: true
    symbols:
      - BTCUSDT
      - ETHUSDT
      - BNBUSDT
      - SOLUSDT
      - HYPEUSDT
      - ASTERUSDT
    params:
      fast_period: 9
      slow_period: 21
      leverage: 100
      order_size_usdt: 100
      timeframe: 5m
      join_trend: true

  - name: rsi_divergence
    enabled: true
    symbols:
      - BTCUSDT
      - ETHUSDT
      - BNBUSDT
      - SOLUSDT
      - HYPEUSDT
      - ASTERUSDT
    params:
      rsi_period: 14
      overbought: 70.0
      oversold: 30.0
      leverage: 100
      order_size_usdt: 100
      timeframe: 15m

  - name: vwap_reversion
    enabled: true
    symbols:
      - BTCUSDT
      - ETHUSDT
      - BNBUSDT
      - SOLUSDT
      - HYPEUSDT
      - ASTERUSDT
    params:
      dev_threshold_pct: 0.5
      order_size_usdt: 100
      leverage: 100
      timeframe: 15m

  - name: bb_bounce
    enabled: true
    symbols:
      - BTCUSDT
      - ETHUSDT
      - BNBUSDT
      - SOLUSDT
      - HYPEUSDT
      - ASTERUSDT
    params:
      period: 20
      std_dev: 2.0
      order_size_usdt: 100
      leverage: 100
      timeframe: 15m

  - name: sr_bounce
    enabled: true
    symbols:
      - BTCUSDT
      - ETHUSDT
      - BNBUSDT
      - SOLUSDT
      - HYPEUSDT
      - ASTERUSDT
    params:
      lookback: 50
      bounce_pct: 0.1
      order_size_usdt: 100
      leverage: 100
      timeframe: 1h

  - name: momentum_roc
    enabled: true
    symbols:
      - BTCUSDT
      - ETHUSDT
      - BNBUSDT
      - SOLUSDT
      - HYPEUSDT
      - ASTERUSDT
      - BNBUSDT
    params:
      roc_period: 10
      roc_threshold: 1.0
      order_size_usdt: 100
      leverage: 100
      timeframe: 15m

  - name: orb
    enabled: true
    symbols:
      - BTCUSDT
      - ETHUSDT
      - BNBUSDT
      - SOLUSDT
      - HYPEUSDT
      - ASTERUSDT
      - BNBUSDT
      - SOLUSDT
    params:
      order_size_usdt: 100
      leverage: 100
      timeframe: 15m

  - name: volume_spike
    enabled: true
    symbols:
      - BTCUSDT
      - ETHUSDT
      - BNBUSDT
      - SOLUSDT
      - HYPEUSDT
      - ASTERUSDT
      - BNBUSDT
      - SOLUSDT
      - HYPEUSDT
    params:
      volume_ma_period: 20
      spike_multiplier: 3.0
      order_size_usdt: 100
      timeframe: 5m

  - name: breakout_retest
    enabled: true
    symbols:
      - BTCUSDT
      - ETHUSDT
      - BNBUSDT
      - SOLUSDT
      - HYPEUSDT
      - ASTERUSDT
    params:
      consolidation_periods: 20
      breakout_vol_mult: 2.0
      retest_tolerance_pct: 0.1
      order_size_usdt: 100
      leverage: 100
      timeframe: 1h

  - name: flag_pennant
    enabled: true
    symbols:
      - BTCUSDT
      - ETHUSDT
      - BNBUSDT
      - SOLUSDT
      - HYPEUSDT
      - ASTERUSDT
    params:
      impulse_min_pct: 3.0
      impulse_candles: 5
      flag_max_retrace_pct: 38.2
      flag_candles: 10
      order_size_usdt: 100
      leverage: 100
      timeframe: 1h

  - name: trailing_sh
    enabled: true
