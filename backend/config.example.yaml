  - name: structure_bos
    enabled: true
    symbols:
      - BTCUSDT
      - ETHUSDT
      - BNBUSDT
      - SOLUSDT
      - HYPEUSDT
      - ASTERUSDT
    params:
      swing_period: 5
      order_size_usdt: 100
      leverage: 100
      timeframe: 1h

  - name: liquidity_sweep
    enabled: true
    symbols:
      - BTCUSDT
      - ETHUSDT
      - BNBUSDT
      - SOLUSDT
      - HYPEUSDT
      - ASTERUSDT
    params:
      lookback: 50
      tolerance_pct: 0.05
      order_size_usdt: 100
      leverage: 100
