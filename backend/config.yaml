bot:
  dry_run: false # ⚠️ Set to false only when ready for live trading

exchange:
  # V1 API Key (deprecated, use V3 below)
  api_key: ""
  
  # V3 Authentication - API Wallet/Agent model
  # Your main wallet address (user)
  user_wallet: ""  # (also set via env: ASTER_USER_WALLET)
  # API wallet address (signer) 
  api_signer: ""   # (also set via env: ASTER_API_SIGNER)
  # API wallet private key (NEVER set here - use env var only)
  # (also set via env: ASTER_API_SIGNER_KEY)
  
  futures_rest_base: "https://fapi.asterdex.com"
  futures_ws_base: "wss://fstream.asterdex.com"
  recv_window: 5000
  requests_per_second: 1

risk:
  max_position_usdt: 2000
  max_open_positions: 5
  max_global_pending_limit_orders: 10
  max_pending_per_side: 2
  daily_loss_limit_usdt: 25
  risk_per_trade_usdt: 5 # Risk $5 per trade (loss on SL hit)
  atr_multiplier: 1.5 # SL distance = 1.5 * ATR
  per_trade_stop_loss_pct: 1.5 # Giữ cho đồng đều với ATR
  per_trade_take_profit_pct: 3.0 # TP mặc định tỷ lệ 1:2
  position_mode: one_way # one_way | hedge

api:
  host: "0.0.0.0"
  port: 8080

log:
  level: debug # debug | info | warn | error
  file: "logs/bot.log"

# Volume Farming Configuration
volume_farming:
  enabled: true # ENABLED WITH REAL API DATA
  max_daily_loss_usdt: 50
  max_total_drawdown_pct: 5.0
  order_size_usdt: 100 # Increased for better volume farming efficiency
  grid_spread_pct: 0.12 # Wider maker grid reduces churn and request pressure
  max_orders_per_side: 1 # Seed only 1 passive order per side
  replace_immediately: false # Do not chase immediate replacement
  position_timeout_minutes: 45 # Let passive orders sit longer before rotating
  ticker_stream: "!ticker@arr"
  symbol_refresh_interval_seconds: 120
  grid_placement_cooldown_seconds: 90
  rate_limit_cooldown_seconds: 300

  # Trading configuration
  supported_quote_currencies: ["USD1"]
  min_volume_24h: 5000000 # Focus only on deeper books

  bot:
    dry_run: false # Set to false for live trading

  symbols:
    auto_discover: true
    quote_currency_mode: "flexible" # strict | flexible
    min_volume_24h: 5000000
    max_spread_pct: 5.0
    boosted_only: false
    max_symbols_per_quote: 2 # Keep universe tight but still enough to rotate volume
    spread_ranking: true
    volume_weighting: 0.7
    min_liquidity_score: 0.0
    optimal_spread_range: [0.01, 0.05]
    spread_volatility_threshold: 0.02
    exclude_high_fee_symbols: true
    quote_currencies: ["USD1"]
    allow_mixed_quotes: false
    whitelist: ["BTCUSDT", "ETHUSDT"] # Optional: ["BTCUSDT", "ETHUSDT"]

  exchange:
    futures_rest_base: "https://fapi.asterdex.com"
    futures_ws_base: "wss://fstream.asterdex.com"
    recv_window: 5000
    requests_per_second: 1

  risk:
    max_position_usdt: 500
    max_open_positions: 2
    max_global_pending_limit_orders: 4
    max_pending_per_side: 1
    daily_loss_limit_usdt: 25
    risk_per_trade_usdt: 3
    atr_multiplier: 1.5
    per_trade_stop_loss_pct: 1.5
    per_trade_take_profit_pct: 3.0
    position_mode: one_way

  api:
    host: "0.0.0.0"
    port: 8081

strategies:
  - name: ema_cross
    enabled: true
    symbols:
      - BTCUSDT
      - ETHUSDT
      - BNBUSDT
      - SOLUSDT
      - HYPEUSDT
      - ASTERUSDT
    params:
      fast_period: 9
      slow_period: 21
      leverage: 200
      order_size_usdt: 100
      timeframe: 5m
      join_trend: true

  - name: rsi_divergence
    enabled: true
    symbols:
      - BTCUSDT
      - ETHUSDT
      - BNBUSDT
      - SOLUSDT
      - HYPEUSDT
      - ASTERUSDT
    params:
      rsi_period: 14
      overbought: 70.0
      oversold: 30.0
      leverage: 200
      order_size_usdt: 100
      timeframe: 15m

  - name: vwap_reversion
    enabled: true
    symbols:
      - BTCUSDT
      - ETHUSDT
      - BNBUSDT
      - SOLUSDT
      - HYPEUSDT
      - ASTERUSDT
    params:
      dev_threshold_pct: 0.5
      order_size_usdt: 100
      leverage: 200
      timeframe: 15m

  - name: bb_bounce
    enabled: true
    symbols:
      - BTCUSDT
      - ETHUSDT
      - BNBUSDT
      - SOLUSDT
      - HYPEUSDT
      - ASTERUSDT
    params:
