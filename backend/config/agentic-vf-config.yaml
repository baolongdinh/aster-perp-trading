# =============================================================================
# AGENTIC + VOLUME FARM UNIFIED CONFIGURATION
# =============================================================================
#
# Đây là config kết hợp cho cả 2 layer:
# - Agentic (Decision Layer): Chọn symbols dựa trên regime detection
# - Volume Farm (Execution Layer): Thực hiện grid trading
#
# HƯỚNG DẪN SỬ DỤNG:
# ==================
# 1. Tìm section cần chỉnh → Đọc comment phía trên
# 2. Hiểu TRADE-OFF → Điều chỉnh value phù hợp
# 3. Restart bot để apply changes
#
# CÁC SECTION CHÍNH:
# 1. optimization.*      - Tối ưu volume/profit (P0) ⭐ NEW
# 2. volume_farming.*    - Grid execution config
# 3. agentic.*           - Symbol selection
# 4. risk.*              - Risk management
# =============================================================================

bot:
  # DRY RUN MODE
  # true:  Chỉ log, không đặt lệnh (test config)
  # false: Vào lệnh thật (production)
  # 
  # ⚠️ Luôn test với dry_run: true trước khi chạy thật
  dry_run: false

# =============================================================================
# AGENTIC DECISION LAYER - Chọn symbol thông minh
# =============================================================================
# Agentic phân tích thị trường, chọn symbol tốt nhất để grid trading.
# Ưu tiên: Sideways market, volatility vừa phải, volume cao.
# =============================================================================
agentic:
  enabled: true
  
  # SYMBOL UNIVERSE - Danh sách cặp giao dịch
  # =========================================
  universe:
    # Danh sách cố định - Agentic sẽ chọn từ đây
    symbols:
      - BTCUSD1  # Ổn định, spread tốt
      - ETHUSD1  # Volume cao
      - SOLUSD1  # Biến động vừa
    
    # HOẶC tự động tìm từ top volume
    # 
    # TRADE-OFF:
    #   auto_discover: false → An toàn, kiểm soát cao
    #   auto_discover: true  → Linh hoạt, có thể bắt trend sớm
    auto_discover: false
    
    # Số symbol tối đa khi auto_discover = true
    # TĂNG: Nhiều cơ hội, nhưng rủi ro spread cao ở coin lạ
    # GIẢM: Tập trung vào coin chất lượng cao
    top_volume_count: 20
    
    # Ngưỡng volume tối thiểu ($10M/ngày)
    # TĂNG: Chỉ chọn coin lớn, an toàn
    # GIẢM: Có thể chọn coin nhỏ, rủi ro cao hơn
    min_24h_volume_usd: 10000000  # $10M
  
  # REGIME DETECTION - Phát hiện trạng thái thị trường
  # ===================================================
  # Xác định: Sideways (tốt cho grid) vs Trending (nguy hiểm)
  #
  # THAM SỐ QUAN TRỌNG NHẤT:
  # - sideways_adx_max: ADX < 25 = sideways (tốt cho grid)
  # - trending_adx_min: ADX > 25 = trending (nguy hiểm)
  #
  # TRADE-OFF ADX:
  #   ADX thấp (15-20): Chặt chẽ, ít giao dịch, an toàn cao
  #   ADX cao (25-30): Dễ dãi, nhiều giao dịch, rủi ro cao
  #
  # KHUYẾN NGHỊ: sideways_adx_max: 20-25
  regime_detection:
    update_interval: 15s        # Tần suất cập nhật
    adx_period: 14            # 14 nến cho ADX (chuẩn)
    bb_period: 10             # 10 nến để đồng bộ với execution layer
    atr_period: 14            # 14 nến cho ATR
    candle_interval: 5m       # Khung thời gian phân tích
    
    thresholds:
      sideways_adx_max: 20      # ADX < 20 = sideways ✓
      trending_adx_min: 25     # ADX > 25 = trending ✗
      volatile_atr_spike: 3.0   # ATR spike = volatile
  
  # SCORING WEIGHTS - Trọng số đánh giá symbol
  # ===========================================
  # Công thức: Score = trend*0.3 + volatility*0.25 + volume*0.25 + structure*0.2
  #
  # ĐIỀU CHỈNH:
  # - Tăng trend: Ưu tiên đang có xu hướng rõ ràng
  # - Tăng volatility: Ưu tiên biến động cao (grid lợi nhuận cao)
  # - Tăng volume: Ưu tiên thanh khoản tốt
  scoring:
    weights:
      trend: 0.30       # Xu hướng (trending strength)
      volatility: 0.25   # Biến động (ATR)
      volume: 0.25       # Khối lượng giao dịch
      structure: 0.20    # Cấu trúc giá (support/resistance)
    
    # Ngưỡng điểm để hành động
    # 
    # TRADE-OFF:
    #   Ngưỡng thấp: Dễ vào lệnh, nhiều trade, rủi ro cao
    #   Ngưỡng cao: Khó vào lệnh, ít trade, chất lượng cao
    thresholds:
      high_score: 70      # Deploy full size
      medium_score: 50    # Deploy reduced size  
      low_score: 35       # Monitor only
      skip_score: 0       # Bỏ qua
  
  # POSITION SIZING - Điều chỉnh size theo điều kiện
  # =================================================
  # 
  # REGIME MULTIPLIERS:
  #   SIDEWAYS: 1.0  → Grid hoạt động tốt nhất, full size
  #   TRENDING: 0.7  → Giảm 30%, tránh bị cuốn theo trend
  #   VOLATILE: 0.5  → Giảm 50%, biến động cao rủi ro cao
  #   RECOVERY: 0.8  → Thận trọng, chưa rõ xu hướng
  position_sizing:
    score_multipliers:
      HIGH: 1.0
      MEDIUM: 0.6
      LOW: 0.3
    
    regime_multipliers:
      SIDEWAYS: 1.0     # Full size - grid hoạt động tốt
      TRENDING: 0.7     # Giảm 30% - rủi ro trend
      VOLATILE: 0.5     # Giảm 50% - biến động cao
      RECOVERY: 0.8     # Giảm 20% - thận trọng
  
  # WHITELIST MANAGEMENT - Quản lý danh sách symbol
  # =================================================
  # 
  # LƯU Ý: Hiện tại TẮT (enabled: false) để dùng whitelist cố định
  # Bật lên nếu muốn agentic tự động thay đổi symbol
  whitelist_management:
    enabled: true               # BẬT - agentic chỉ orchestration whitelist
    max_symbols: 5              # Tối đa 5 symbol cùng lúc
    min_score_to_add: 45        # Điểm tối thiểu để thêm
    score_to_remove: 30         # Điểm dưới này thì xóa
    keep_if_position_open: true  # Giữ symbol nếu đang có position
    replace_immediately: true    # Thay thế ngay khi tìm được symbol tốt hơn
  
  # CIRCUIT BREAKERS - Tự động dừng khi rủi ro
  # ==============================================
  # Tự động dừng trading khi phát hiện điều kiện nguy hiểm
  circuit_breakers:
    volatility_spike:
      enabled: true
      atr_multiplier: 3.0       # ATR > 3x trung bình = dừng
    
    consecutive_losses:
      enabled: true
      threshold: 3              # 3 lỗi liên tiếp
      size_reduction: 0.5       # Giảm 50% size sau đó

# =============================================================================
# VOLUME FARMING EXECUTION LAYER - Thực hiện grid trading
# =============================================================================
# Đây là phần quan trọng nhất để tối ưu volume và profit.
# Mỗi tham số ảnh hưởng trực tiếp đến hiệu suất.
# =============================================================================
volume_farming:
  enabled: true

  # LOSS LIMITS - Giới hạn lỗ
  # =========================
  # 
  # max_daily_loss_usdt: Lỗ tối đa/ngày trước khi dừng
  # TRADE-OFF:
  #   Cao (5-10): Chịu được drawdown lớn, nhưng rủi ro cao
  #   Thấp (1-3): An toàn, nhưng dễ bị dừng sớm do nhiễu
  max_daily_loss_usdt: 3
  
  # max_total_drawdown_pct: Drawdown tối đa cho phép (%)
  max_total_drawdown_pct: 50.0

  # ORDER CONFIGURATION - Cấu hình lệnh
  # =====================================
  #
  # TRADE-OFF TABLE:
  # ┌─────────────────────────┬──────────────────┬──────────────────┐
  # │   Tham số               │   TĂNG           │   GIẢM          │
  # ├─────────────────────────┼──────────────────┼──────────────────┤
  # │ order_size_usdt         │ Profit/fill cao  │ Risk thấp       │
  # │   (3-50)                │ Margin nhiều     │ Margin ít       │
  # ├─────────────────────────┼──────────────────┼──────────────────┤
  # │ grid_spread_pct         │ Profit/fill cao  │ Nhiều fill hơn  │
  # │   (0.05-0.5%)           │ Ít fill          │ Volume cao      │
  # ├─────────────────────────┼──────────────────┼──────────────────┤
  # │ max_orders_per_side     │ Bao phủ rộng     │ Margin ít       │
  # │   (3-10)                │ Nhiều cơ hội     │ Tập trung       │
  # ├─────────────────────────┼──────────────────┼──────────────────┤
  # │ position_timeout_       │ Chờ hồi phục     │ Cắt lỗ nhanh    │
  # │   minutes (3-10)         │ Có thể miss      │ An toàn hơn     │
  # └─────────────────────────┴──────────────────┴──────────────────┘
  #
  # KHUYẾN NGHỊ CHO VOLUME FARMING:
  # - order_size_usdt: 3-5 (micro grid), 10-20 (normal)
  # - grid_spread_pct: 0.05-0.1% (micro grid), 0.15-0.2% (normal)
  # - max_orders_per_side: 5 (micro grid), 10 (normal)
  order_size_usdt: 20.5

  grid_spread_pct: 0.0015
  
  # max_orders_per_side: Số lệnh tối đa mỗi bên
  # ========================================================
  # TRADE-OFF:
  #   Nhiều (5-10): Bao phủ range rộng, nhiều fill, cần nhiều margin
  #   Ít (3-5): Tập trung, ít margin, có thể miss cơ hội
  max_orders_per_side: 10
  
  max_global_pending_limit_orders: 30
  max_pending_per_side: 15
  
  # replace_immediately: Đặt lại lệnh ngay sau khi fill
  # =====================================================
  # true: Luôn duy trì grid đầy đủ → Volume cao nhất
  # false: Chờ điều kiện mới → Volume thấp hơn, an toàn hơn
  replace_immediately: true
  
  # position_timeout_minutes: Thời gian tối đa giữ position
  # ===========================================================
  # TRADE-OFF:
  #   Dài (10-15): Chờ cơ hội tốt hơn, nhưng rủi ro biến động
  #   Ngắn (3-5): Nhanh chóng cắt lỗ, nhưng có thể miss hồi phục
  position_timeout_minutes: 5

  # TIME FILTER - Hạn chế giờ giao dịch
  # ===================================
  # Ví dụ: Chỉ trade giờ Âu-Mỹ (volume cao)
  # MẶC ĐỊNH: Tắt (trade 24/7)
  time_filter:
    enabled: false
    trading_hours:
      start: "00:00"         # UTC
      end: "23:59"           # UTC
    days: ["monday", "tuesday", "wednesday", "thursday", "friday", "saturday", "sunday"]

  ticker_stream: "!ticker@arr"
  symbol_refresh_interval_seconds: 60
  grid_placement_cooldown_seconds: 0
  rate_limit_cooldown_seconds: 3
  rate_limiter_capacity: 200
  rate_limiter_refill_rate: 5.0

  supported_quote_currencies: ["USD1"]
  min_volume_24h: 1000

  # SYMBOL SELECTION
  # ================
  symbols:
    auto_discover: false
    quote_currency_mode: "USD1"
    supported_quote_currencies: ["USD1"]
    quote_currencies: ["USD1"]
    allow_mixed_quotes: false
    min_volume_24h: 1000
    max_spread_pct: 5.0          # Bỏ qua nếu spread > 5%
    boosted_only: false
    max_symbols_per_quote: 1
    spread_ranking: true
    volume_weighting: 0.5
    min_liquidity_score: 0.7
    optimal_spread_range: [0.0, 0.5]
    spread_volatility_threshold: 0.1
    exclude_high_fee_symbols: true
    
    whitelist: ["BTCUSD1", "ETHUSD1", "SOLUSD1"]
    blacklist: []

  exchange:
    api_key: "${ASTER_API_KEY}"
    futures_rest_base: "https://fapi.asterdex.com"
    futures_ws_base: "wss://fstream.asterdex.com"
    recv_window: 5000
    requests_per_second: 0.5  # Ultra-conservative: 1 request per 2 seconds

  # FUNDING RATE
  # ============
  # Funding rate cao → Chi phí nắm giữ position cao
  funding_rate:
    enabled: true
    high_threshold: 0.001       # Cảnh báo khi > 0.1%
    extreme_threshold: 0.005    # Nguy hiểm khi > 0.5%
    bias_strength: 0.7
    skip_threshold: 0.01        # Bỏ qua symbol nếu > 1%
    check_interval_minutes: 5

  # DYNAMIC GRID SPREAD
  # ===================
  # Tự động điều chỉnh spread theo ATR (volatility)
  # ATR thấp → Spread hẹp (0.8x)
  # ATR cao → Spread rộng (1.5-2x)
  dynamic_grid:
    enabled: true
    base_spread_pct: 0.0015
    low_atr_threshold: 0.3
    normal_atr_threshold: 0.8
    high_atr_threshold: 1.5
    low_multiplier: 0.8
    normal_multiplier: 1.0
    high_multiplier: 1.5
    extreme_multiplier: 2.0
    atr_period: 7

  # SMART POSITION SIZING
  # =====================
  # Tự động điều chỉnh size dựa trên hiệu suất gần đây (Kelly Criterion)
  # Win rate cao → Tăng size
  # Loss streak → Giảm size (decay 0.8)
  smart_sizing:
    enabled: true
    kelly_fraction: 0.25
    consecutive_loss_decay: 0.8
    min_size: 5.0
    max_size: 100.0
    window_hours: 24

  # PARTIAL CLOSE
  # =============
  # Chia position thành 3 phần, chốt dần
  # TP1 (0.5%): Chốt 30% → Thu hồi vốn nhanh
  # TP2 (1.0%): Chốt 40% → Lợi nhuận chính
  # TP3 (1.5%): Chốt 30% + Trailing → Tận dụng trend
  partial_close:
    enabled: true
    tp1:
      close_pct: 0.30
      profit_pct: 0.005
    tp2:
      close_pct: 0.40
      profit_pct: 0.01
    tp3:
      close_pct: 0.30
      profit_pct: 0.015
    trailing_after_tp2: true
    trailing_distance: 0.005

  # RISK MANAGEMENT
  # ===============
  # Cấu hình quản lý rủi ro chi tiết
  #
  # TRADE-OFF:
  # ┌──────────────────────────┬──────────────────┬──────────────────┐
  # │   Tham số               │   TĂNG           │   GIẢM          │
  # ├──────────────────────────┼──────────────────┼──────────────────┤
  # │ max_position_usdt       │ Profit cao       │ Risk thấp       │
  # │   (100-500)             │ Margin nhiều     │ Margin ít       │
  # ├──────────────────────────┼──────────────────┼──────────────────┤
  # │ stop_loss_pct           │ Ít stop loss     │ Nhiều stop loss │
  # │   (0.5-2.0%)            │ Profit cao       │ An toàn hơn     │
  # ├──────────────────────────┼──────────────────┼──────────────────┤
  # │ liquidation_buffer_pct  │ Margin ít        │ Margin nhiều     │
  # │   (0.2-0.5)             │ Risk cao         │ Risk thấp       │
  # ├──────────────────────────┼──────────────────┼──────────────────┤
  # │ max_consecutive_losses  │ Trade nhiều      │ Trade ít         │
  # │   (2-5)                 │ nhưng rủi ro cao │ nhưng an toàn   │
  # └──────────────────────────┴──────────────────┴──────────────────┘
  risk:
    # Position Limits
    max_position_usdt_per_symbol: 300      # Max 300 USDT per symbol
    max_unhedged_exposure_usdt: 200        # Max 200 USDT unhedged
    max_total_positions_usdt: 500          # Max 500 USDT total
    max_open_positions: 3                  # Max 3 positions cùng lúc

    # Loss Limits
    max_unrealized_loss_usdt: 3.0          # Close nếu unrealized loss > 3 USDT/position
    per_position_loss_limit_usdt: 1.0       # Close position nếu loss > 1 USDT
    total_net_loss_limit_usdt: 5.0          # Close ALL nếu total loss > 5 USDT
    daily_loss_limit_usdt: 3               # Lỗ tối đa/ngày
    daily_drawdown_pct: 50.0               # Drawdown tối đa %

    # Stop Loss & Take Profit
    stop_loss_pct: 0.01                    # 1% stop loss
    trailing_stop_pct: 0.01                # Activate tại 1% profit
    trailing_stop_distance_pct: 0.005      # 0.5% trailing distance
    per_trade_stop_loss_pct: 2.0           # 2% SL per trade
    per_trade_take_profit_pct: 1.0         # 1% TP per trade
    take_profit_rratio: 1.5                # 1.5:1 R:R
    min_take_profit_pct: 0.5               # Min 0.5% TP
    max_take_profit_pct: 2.0               # Max 2% TP

    # Liquidation Protection
    liquidation_buffer_pct: 0.35           # Close tại 35% distance đến liquidation
    position_check_interval: 10s           # Kiểm tra position mỗi 10s

    # Trend Protection
    trending_threshold: 0.7                # Pause nếu trending > 70%
    use_directional_bias: true             # Chỉ trade với trend

    # Consecutive Loss Protection
    max_consecutive_losses: 3             # Exit sau 3 loss liên tiếp
    cooldown_duration: 30s                # Cooldown 30s sau 3 loss

    # Order Limits
    max_global_pending_limit_orders: 30   # Max 30 orders pending
    max_pending_per_side: 15               # Max 15 orders mỗi side

    # Other Risk Settings
    risk_per_trade_usdt: 2.0               # 2 USDT risk/trade
    atr_multiplier: 2.0                    # 2x ATR cho stop loss
    position_mode: "one_way"               # one_way: chỉ LONG hoặc SHORT
    correlation_threshold: 0.8             # Correlation > 80% = risky
    maker_priority: true                   # Ưu tiên maker orders

    # PnL Risk Control - Cắt lỗ động dựa trên unrealized PnL
    pnl_risk_control:
      enabled: true                        # Bật/tắt PnL risk control
      partial_loss_usdt: 1.0               # Cắt 50% position khi loss > $1 (TRADING -> EXIT_HALF)
      full_loss_usdt: 1.0                  # Cắt toàn bộ khi loss > $1 trong EXIT_HALF (EXIT_HALF -> EXIT_ALL)
      recovery_threshold_usdt: 0.0         # Recovery threshold để về TRADING (0 = break even)
      partial_close_pct: 0.5               # Tỷ lệ cắt khi partial loss (0.5 = 50%)

    # Market Condition Evaluator - Đánh giá điều kiện thị trường để chọn state phù hợp
    market_condition_evaluator:
      enabled: true                        # Bật/tắt market condition evaluator (true = enable adaptive states)
      evaluation_interval_sec: 1          # Đánh giá mỗi kline (1 giây)
      min_confidence_threshold: 0.7       # Confidence tối thiểu để switch state (0.7 = 70%)
      state_stability_duration: 30         # Thời gian tối thiểu ở state trước khi consider switch (giây)

    # OVER_SIZE State - Khi position size vượt quá giới hạn
    over_size:
      threshold_pct: 0.8                  # Ngưỡng kích hoạt OVER_SIZE (80% MaxPositionUSDT)
      recovery_pct: 0.6                   # Ngưỡng thoát OVER_SIZE (60% MaxPositionUSDT)

    # DEFENSIVE State - Khi volatility quá cao
    defensive_state:
      atr_multiplier_threshold: 3.0       # ATR multiplier để kích hoạt DEFENSIVE
      bb_width_threshold: 0.05            # BB width % để kích hoạt DEFENSIVE (5%)
      spread_multiplier: 2.0               # Nhân spread trong DEFENSIVE (2x)
      sl_multiplier: 0.8                  # Nhân SL trong DEFENSIVE (0.8x = chặt hơn)
      allow_new_positions: false           # Cho phép mở position mới trong DEFENSIVE

    # RECOVERY State - Recovery sau khi cắt lỗ
    recovery_state:
      recovery_threshold_usdt: 0.0         # Ngưỡng PnL để vào RECOVERY (0 = break even)
      size_multiplier: 0.5                # Nhân size trong RECOVERY (0.5x)
      spread_multiplier: 1.5               # Nhân spread trong RECOVERY (1.5x)
      stable_duration_min: 30              # Thời gian PnL ổn định tối thiểu (phút)

    # ConditionBlocker - Conditional blocking (replaces state-based blocking)
    condition_blocker:
      enabled: true                        # Bật/tắt ConditionBlocker
      # Score weights (tổng = 1.0)
      position_size_weight: 0.3            # Trọng số position size (30%)
      volatility_weight: 0.2              # Trọng số volatility (20%)
      risk_weight: 0.25                    # Trọng số risk (25%)
      trend_weight: 0.1                   # Trọng số trend (10%)
      skew_weight: 0.15                    # Trọng số skew (15%)
      # Blocking thresholds
      blocking_threshold: 0.7              # Ngưỡng kích hoạt blocking (0.7 = 70%)
      micro_mode_min: 0.1                  # Ngưỡng MICRO mode (0.1 = 10% size)

    # AdaptiveThresholds - Adaptive threshold management
    adaptive_thresholds:
      enabled: true                        # Bật/tắt adaptive thresholds
      # Base thresholds
      base_position_threshold: 0.8        # Base threshold for position size
      base_volatility_threshold: 0.8      # Base threshold for volatility
      base_risk_threshold: 0.6            # Base threshold for risk
      base_trend_threshold: 0.7           # Base threshold for trend
      # Adaptation parameters
      adaptation_rate: 0.1                # How quickly thresholds adapt (0-1)
      min_threshold: 0.1                   # Minimum threshold value
      max_threshold: 1.0                   # Maximum threshold value
      # Learning parameters
      enable_learning: true                # Enable threshold learning from performance
      learning_rate: 0.05                  # Learning rate for threshold adaptation

    # Dynamic Sizing - Enhanced position sizing with multiple factors
    dynamic_sizing:
      enabled: true                        # Bật/tắt dynamic sizing
      # Kelly Criterion
      kelly_fraction: 0.25                 # Conservative Kelly fraction (25%)
      min_kelly: 0.1                       # Minimum Kelly (10%)
      max_kelly: 1.0                       # Maximum Kelly (100%)
      # Consecutive loss decay
      loss_decay_rate: 0.8                 # Size reduction per loss (20%)
      win_recovery_rate: 1.1               # Size increase per win (10%)
      max_recovery_multiplier: 1.5        # Max size multiplier after wins
      # Risk adjustment
      drawdown_factor: 1.0                 # Drawdown impact (1.0 = 100%)
      min_drawdown_factor: 0.5             # Minimum factor after drawdown
      pnl_increase_cap: 0.5                # Max size increase from PnL (+50%)
      pnl_decrease_cap: 0.3                # Max size decrease from PnL (-30%)
      # Opportunity adjustment
      spread_factor: 10.0                  # Spread impact multiplier
      min_spread_factor: 0.3               # Minimum spread factor
      depth_factor: 10000.0                # Order book depth divisor
      max_depth_increase: 0.2              # Max size increase from depth (+20%)
      funding_factor: 10.0                 # Funding rate impact
      max_funding_adjustment: 0.2          # Max size adjustment from funding (±20%)
      # Liquidity adjustment
      depth_divisor: 50000.0               # Order book depth divisor for liquidity
      max_depth_liquidity: 0.3            # Max size increase from liquidity (+30%)
      volume_divisor: 1000000.0            # Volume divisor
      max_volume_increase: 0.2             # Max size increase from volume (+20%)
      # Size limits
      min_size_usdt: 5.0                   # Minimum order size
      max_size_usdt: 100.0                 # Maximum order size
      base_size_pct: 0.01                  # Base size as % of equity (1%)
      leverage_normalization: 50.0         # Leverage normalization (50x base)

    # Dynamic Timeout - Adaptive EXIT_ALL timeout based on conditions
    dynamic_timeout:
      enabled: true                        # Bật/tắt dynamic timeout
      base_timeout_seconds: 15             # Base timeout in seconds
      min_timeout_seconds: 5               # Minimum timeout (loss positions)
      max_timeout_seconds: 60              # Maximum timeout (profitable positions)
      # PnL-based adjustment
      pnl_multiplier: 10.0                 # PnL impact on timeout (profitable = longer)
      loss_multiplier: 5.0                 # Loss impact on timeout (loss = shorter)
      max_pnl_multiplier: 4.0              # Max timeout multiplier from PnL
      min_loss_multiplier: 0.33            # Min timeout multiplier from loss
      # Volatility-based adjustment
      low_volatility_adx: 30              # ADX threshold for low volatility
      low_volatility_multiplier: 1.2       # Timeout multiplier in low volatility
      high_volatility_adx: 60             # ADX threshold for high volatility
      high_volatility_multiplier: 0.7      # Timeout multiplier in high volatility
      # Regime-based adjustment
      ranging_multiplier: 1.1              # Timeout multiplier in ranging regime
      trending_multiplier: 0.8             # Timeout multiplier in trending regime
      volatile_multiplier: 0.6             # Timeout multiplier in volatile regime

    # Conditional Transitions - Advanced state transition logic
    conditional_transitions:
      enabled: true                        # Bật/tắt conditional transitions
      confidence_threshold: 0.6            # Minimum confidence to allow transition (0-1)
      # Emergency transition thresholds
      emergency_risk_count: 2              # Number of high risks to trigger emergency EXIT_ALL
      position_risk_threshold: 0.8         # Position % threshold for risk (80%)
      volatility_risk_threshold: 0.8       # Volatility threshold for risk (0-1)
      drawdown_risk_threshold: 0.15        # Drawdown threshold for risk (15%)
      # Conditional transition thresholds
      over_size_to_defensive:
        position_threshold: 0.7            # Position % to allow OVER_SIZE → DEFENSIVE
        volatility_threshold: 0.8          # Volatility to allow transition
      defensive_to_recovery:
        pnl_threshold: 0.0                 # PnL threshold to allow DEFENSIVE → RECOVERY (negative = loss)
      recovery_to_over_size:
        position_threshold: 0.6            # Position % to allow RECOVERY → OVER_SIZE

    # Graduated Trading Modes - Circuit breaker mode management
    graduated_modes:
      enabled: true                        # Bật/tắt graduated trading modes
      # Mode thresholds for CalculateTradingMode
      paused_drawdown_threshold: 0.2        # Drawdown threshold for PAUSED mode (20%)
      paused_loss_threshold: 5              # Consecutive losses threshold for PAUSED
      paused_volatility_threshold: 0.9      # Volatility threshold for PAUSED
      reduced_drawdown_threshold: 0.1       # Drawdown threshold for REDUCED mode (10%)
      reduced_loss_threshold: 3             # Consecutive losses threshold for REDUCED
      reduced_risk_threshold: 0.8          # Risk threshold for REDUCED
      reduced_volatility_threshold: 0.6     # Volatility threshold for REDUCED
      full_risk_threshold: 0.5             # Risk threshold for FULL mode
      full_volatility_threshold: 0.4       # Volatility threshold for FULL mode
      full_drawdown_threshold: 0.05        # Drawdown threshold for FULL mode
      # Mode parameters
      min_mode_duration_minutes: 5          # Minimum time to stay in each mode (5 minutes)
      full_mode:
        spread_multiplier: 1.0              # Spread multiplier (1x normal)
        order_multiplier: 1.0              # Order count multiplier (1x normal)
        size_multiplier: 1.0               # Order size multiplier (1x normal)
      reduced_mode:
        spread_multiplier: 1.5              # Spread multiplier (1.5x wider)
        order_multiplier: 0.5              # Order count multiplier (0.5x fewer)
        size_multiplier: 0.5               # Order size multiplier (0.5x smaller)
      micro_mode:
        spread_multiplier: 0.5              # Spread multiplier (0.5x tighter)
        order_multiplier: 2.0              # Order count multiplier (2x more)
        size_multiplier: 0.1               # Order size multiplier (0.1x tiny)
      paused_mode:
        spread_multiplier: 0.0              # No trading
        order_multiplier: 0.0              # No orders
        size_multiplier: 0.0               # No size

    # Graduated Exit Options - Dynamic exit logic
    graduated_exit:
      enabled: true                        # Bật/tắt graduated exit
      small_loss_threshold: 0.02          # 2% loss threshold for 25% exit
      medium_loss_threshold: 0.05         # 5% loss threshold for 50% exit
      large_loss_threshold: 0.10          # 10% loss threshold for 75% exit
      extreme_loss_threshold: 0.15         # 15% loss threshold for 100% exit
      exit_percentages:
        small_loss: 0.25                   # 25% exit for small loss
        medium_loss: 0.50                 # 50% exit for medium loss
        large_loss: 0.75                  # 75% exit for large loss
        extreme_loss: 1.0                 # 100% exit for extreme loss

# =============================================================================
# API & LOGGING
# =============================================================================
api:
  host: "0.0.0.0"
  port: 8081

log:
  level: "info"
  file: "logs/agentic-vf.log"

# =============================================================================
# RANGE DETECTOR CONFIGURATION - Phát hiện range giá
# =============================================================================
# RangeDetector xác định vùng giá sideways để grid trading hoạt động tốt nhất
#
# THAM SỐ QUAN TRỌNG:
# - method: Phương pháp tính range (BB, ATR, combined)
# - periods: Số nến để tính range (5 = fast warm-up)
# - breakout_threshold: Ngưỡng breakout (2% = price vượt range 2%)
# - stabilization_period: Thời gian chờ sau breakout trước khi reentry
#
# TRADE-OFF:
# ┌────────────────────┬──────────────────┬──────────────────┐
# │   Tham số          │   TĂNG           │   GIẢM          │
# ├────────────────────┼──────────────────┼──────────────────┤
# │ periods            │ Warm-up lâu hơn  │ Warm-up nhanh   │
# │   (5-20)           │ Range ổn định    │ Range nhạy cảm  │
# ├────────────────────┼──────────────────┼──────────────────┤
# │ breakout_threshold│ Ít breakout      │ Nhiều breakout  │
# │   (0.01-0.05)      │ Trade nhiều hơn  │ An toàn hơn     │
# ├────────────────────┼──────────────────┼──────────────────┤
# │ stabilization_     │ Chờ lâu hơn      │ Reentry nhanh   │
# │   period (5-30s)   │ Range chắc chắn  │ Có thể nhầm    │
# └────────────────────┴──────────────────┴──────────────────┘
#
# KHUYẾN NGHỊ: periods: 5, breakout_threshold: 0.02, stabilization_period: 10s
range_detector:
  method: "combined"          # combined: Dùng cả BB và ATR
  periods: 5                  # 5 nến (fast warm-up: 5 phút cho 1m klines)
  bb_multiplier: 2.0         # 2 sigma cho BB (chuẩn)
  atr_multiplier: 1.5        # 1.5x ATR cho range
  breakout_threshold: 0.02   # 2% vượt range = breakout
  stabilization_period: 10s  # Chờ 10s sau breakout
  min_range_width_pct: 0.0001  # Tối thiểu 0.01% range width
  adx_period: 14
  material_shift_pct: 0.005  # 0.5% shift = material
  width_change_pct: 0.0015   # 0.15% width change = significant
  reentry_confirmations: 2   # Số xác nhận để reentry
  entry_confirmations: 1     # Số xác nhận để entry
  outside_band_confirmations: 3  # Số nến outside band để breakout
  bb_expansion_factor: 1.5   # 1.5x expansion = breakout

# =============================================================================
# INVENTORY MANAGEMENT - Quản lý inventory skew
# =============================================================================
# InventoryManager theo dõi skew giữa LONG và SHORT positions
# Tự động điều chỉnh size/pause side khi skew quá lớn
#
# LOGIC:
# - Skew = |LONG - SHORT| / Total Position
# - Skew thấp (<40%): Không điều chỉnh
# - Skew trung bình (40-80%): Giảm size 20% side skew
# - Skew cao (80-100%): Giảm size 30% + giảm TP 20% side skew
# - Skew nghiêm trọng (>120%): Giảm size 50% + giảm TP 30% + PAUSE side skew
#
# TRADE-OFF:
#   max_inventory_pct cao: Cho phép skew lớn, nhưng rủi ro directional
#   max_inventory_pct thấp: Skew nhỏ, an toàn hơn, nhưng có thể miss opportunity
inventory_management:
  enabled: true
  max_inventory_pct: 0.30     # Tối đa 30% skew cho phép

  # Ngưỡng skew và hành động tương ứng
  low_threshold:
    threshold: 0.40            # 40% skew
    size_reduction: 0.0         # Không giảm size
    pause_side: false          # Không pause

  moderate_threshold:
    threshold: 0.80            # 80% skew
    size_reduction: 0.20       # Giảm 20% size
    pause_side: false          # Không pause

  high_threshold:
    threshold: 1.0             # 100% skew
    size_reduction: 0.30       # Giảm 30% size
    pause_side: false          # Không pause
    take_profit_reduction: 0.20  # Giảm 20% TP

  critical_threshold:
    threshold: 1.2             # 120% skew
    size_reduction: 0.50       # Giảm 50% size
    pause_side: true           # PAUSE side skew
    take_profit_reduction: 0.30  # Giảm 30% TP

# =============================================================================
# CLUSTER STOP LOSS - Stop loss cho cluster positions
# =============================================================================
# ClusterManager theo dõi drawdown của cluster positions
# Tự động đóng position khi drawdown quá lớn
#
# LOGIC:
# - Monitor: Theo dõi 2 giờ, drawdown < -0.5%
# - Emergency: Theo dõi 4 giờ, drawdown < -1.0%
# - Breakeven: Breakeven 50% tại -0.2%, 100% tại 0%
#
# TRADE-OFF:
#   monitor_hours dài: Theo dõi lâu hơn, nhưng có thể miss early exit
#   monitor_hours ngắn: Exit sớm hơn, an toàn hơn, nhưng có thể miss recovery
cluster_stop_loss:
  enabled: false              # TẮT mặc định (chỉ bật khi cần)
  monitor_hours: 2            # Theo dõi 2 giờ
  emergency_hours: 4          # Emergency sau 4 giờ
  stale_hours: 8              # Stale sau 8 giờ
  monitor_drawdown: -0.005    # -0.5% drawdown = monitor
  emergency_drawdown: -0.01   # -1.0% drawdown = emergency
  breakeven50_pct_at: -0.002  # Breakeven 50% tại -0.2%
  breakeven100_pct_at: 0.0    # Breakeven 100% tại 0%
  min_drawdown_for50_pct: -0.02  # Min -2% để breakeven 50%
  min_drawdown_for100_pct: -0.03 # Min -3% để breakeven 100%

# =============================================================================
# DYNAMIC SPREAD CALCULATOR - Tự động điều chỉnh spread
# =============================================================================
# DynamicSpreadCalculator điều chỉnh spread theo ATR (volatility)
#
# LOGIC:
# - ATR thấp (<0.3%): Spread hẹp (0.8x base) → Nhiều fill
# - ATR bình thường (0.3-0.8%): Spread chuẩn (1.0x base)
# - ATR cao (0.8-1.5%): Spread rộng (1.5x base) → Ít fill hơn
# - ATR cực cao (>1.5%): Spread rất rộng (2.0x base) → Rất ít fill
#
# TRADE-OFF:
#   base_spread_pct cao: Profit/fill cao, nhưng ít fill hơn
#   base_spread_pct thấp: Nhiều fill, nhưng profit/fill thấp
dynamic_spread:
  enabled: true
  base_spread_pct: 0.01       # 0.01% base spread
  low_threshold: 0.3          # ATR < 0.3% = low vol
  normal_threshold: 0.8       # ATR < 0.8% = normal vol
  high_threshold: 1.5          # ATR < 1.5% = high vol
  low_multiplier: 0.8          # 0.8x spread khi low vol
  normal_multiplier: 1.0      # 1.0x spread khi normal vol
  high_multiplier: 1.5        # 1.5x spread khi high vol
  extreme_multiplier: 2.0     # 2.0x spread khi extreme vol
  atr_period: 7               # 7 nến ATR

# =============================================================================
# TREND DETECTOR - Phát hiện trend
# =============================================================================
# TrendDetector phát hiện trend strength dựa trên RSI
#
# LOGIC:
# - RSI > 70: Overbought → Trend UP mạnh
# - RSI < 30: Oversold → Trend DOWN mạnh
# - RSI 30-70: Sideways
#
# TRADE-OFF:
#   rsi_period dài: Trend detection chậm hơn, nhưng ổn định hơn
#   rsi_period ngắn: Trend detection nhanh hơn, nhưng nhiều false signal
trend_detector:
  enabled: false              # TẮT mặc định (chỉ bật khi cần)
  rsi_period: 14              # 14 nến RSI (chuẩn)
  update_interval: 5m         # Cập nhật mỗi 5 phút

# =============================================================================
# FUNDING RATE MONITOR - Theo dõi funding rate
# =============================================================================
# FundingRateMonitor theo dõi funding rate để điều chỉnh bias
#
# LOGIC:
# - Funding < 0.1%: Bias SHORT (tránh phí funding)
# - Funding > 0.1%: Bias LONG (kiếm phí funding)
# - Funding > 0.5%: Skip symbol (quá cao)
#
# TRADE-OFF:
#   high_threshold thấp: Bắt đầu bias sớm hơn, an toàn hơn
#   high_threshold cao: Bắt đầu bias muộn hơn, nhưng nhiều opportunity
funding_monitor:
  enabled: true
  high_threshold: 0.001      # 0.1% = high (bias adjustment)
  extreme_threshold: 0.005   # 0.5% = extreme (skip opening)
  bias_strength: 0.7         # 70% bias strength
  skip_threshold: 0.01       # 1% = skip symbol
  check_interval_minutes: 5  # Kiểm tra mỗi 5 phút

# =============================================================================
# VOLUME SCALER - Điều chỉnh size theo volume
# =============================================================================
# VolumeScaler điều chỉnh order size theo volume 24h
#
# LOGIC:
# - Volume cao: Size lớn (center notional)
# - Volume thấp: Size nhỏ (edge notional)
#
# TRADE-OFF:
#   center_notional cao: Profit cao, nhưng rủi ro cao
#   edge_notional thấp: An toàn, nhưng profit thấp
volume_scaler:
  enabled: false              # TẮT mặc định (chỉ bật khi cần)
  center_notional: 150.0      # $150 ở center (volume cao)
  edge_notional: 20.0         # $20 ở edge (volume thấp)
  scaling_factor: 0.5         # 50% scaling

# =============================================================================
# TIME FILTER - Lọc giờ giao dịch
# =============================================================================
# TimeFilter giới hạn giờ giao dịch theo timezone
#
# LOGIC:
# - Mode: select (chỉ trade trong slot được chọn)
# - Mode: exclude (trade trừ slot được loại)
# - Slots: Danh sách giờ trade với size multiplier
#
# TRADE-OFF:
#   Nhiều slots: Trade nhiều giờ, volume cao, nhưng rủi ro cao
#   Ít slots: Trade ít giờ, an toàn hơn, nhưng volume thấp
time_filter:
  enabled: true
  mode: "select"              # select: chỉ trade trong slot
  timezone: "Asia/Ho_Chi_Minh"  # Timezone

  # Trading slots với size multiplier
  slots:
    - name: "Phiên Á"
      start: "07:00"
      end: "12:00"
      size_multiplier: 1.0    # Full size
      days: ["monday", "tuesday", "wednesday", "thursday", "friday"]

    - name: "Phiên Âu"
      start: "13:00"
      end: "18:00"
      size_multiplier: 0.7    # Giảm 30%
      days: ["monday", "tuesday", "wednesday", "thursday", "friday"]

    - name: "Phiên Mỹ"
      start: "19:00"
      end: "23:00"
      size_multiplier: 0.3    # Giảm 70%
      days: ["monday", "tuesday", "wednesday", "thursday", "friday"]

    - name: "Phiên khuya"
      start: "01:00"
      end: "07:00"
      size_multiplier: 0.8    # Giảm 20%
      days: ["monday", "tuesday", "wednesday", "thursday", "friday"]

# =============================================================================
# OPTIMIZATION CONFIGURATION - TỐI ƯU GRID TRADING ⭐ NEW
# =============================================================================
# ĐÂY LÀ PHẦN QUAN TRỌNG NHẤT để đạt được:
#   - Volume cao (nhiều fill)
#   - Profit micro (8-40 bps)
#   - Risk thấp (liquidation protection)
#
# ⚠️ Tất cả đều mặc định TẮT để test từng cái
# → Bật lên sau khi hiểu rõ tác dụng
# =============================================================================
optimization:

  # ===========================================================================
  # MICRO GRID - Grid siêu nhỏ cho volume cực cao
  # ===========================================================================
  # Mục tiêu: Tối đa số lần fill, micro profit mỗi fill
  #
  # KHI NÀO DÙNG:
  # - Thị trường sideways chặt (BTC/ETH range-bound)
  # - Muốn tối đa volume farming points
  #
  # TRADE-OFFS MICRO_GRID:
  # ┌────────────────┬──────────────────┬──────────────────┐
  # │   Tham số      │   TĂNG           │   GIẢM          │
  # ├────────────────┼──────────────────┼──────────────────┤
  # │ enabled        │ Volume +200%     │ Risk slippage   │
  # │                │ Profit/fill thấp │ An toàn hơn    │
  # ├────────────────┼──────────────────┼──────────────────┤
  # │ spread_pct     │ Profit/fill cao  │ Ít fill hơn   │
  # │   (0.05-0.2%)  │ An toàn hơn      │ Volume thấp   │
  # ├────────────────┼──────────────────┼──────────────────┤
  # │ orders_per_side│ Bao phủ rộng     │ Cần margin    │
  # │   (3-7)        │ Nhiều cơ hội     │ nhiều hơn     │
  # ├────────────────┼──────────────────┼──────────────────┤
  # │ order_size_usdt│ Profit/lệnh cao  │ Risk lớn      │
  # │   ($3-10)      │ Lỗ nhiều hơn     │ An toàn       │
  # └────────────────┴──────────────────┴──────────────────┘
  #
  # KHUYẾN NGHỊ: spread_pct: 0.05%, orders_per_side: 5, order_size_usdt: 3.0
  micro_grid:
    enabled: true           # ⚠️ Bật sau khi test kỹ
    spread_pct: 0.0005       # 0.05% = 5 bps (ultra-tight)
    orders_per_side: 5       # 5 lệnh mỗi side (vs 3 mặc định)
    order_size_usdt: 3.0     # $3/lệnh (vs $5 mặc định)
    min_profit_per_fill: 0.0002  # 2 bps min để cover phí

  # ===========================================================================
  # FAST RANGE DETECTION - Phát hiện range nhanh hơn
  # ===========================================================================
  # Giảm BB period từ 20 → 10 để phát hiện range mới nhanh hơn
  #
  # LỢI ÍCH:
  # - Vào lệnh sớm hơn sau breakout
  # - Bắt kịp range ngắn hạn
  #
  # RỦI RO:
  # - False positive nhiều hơn
  # - Có thể vào lệnh khi chưa thực sự stable
  #
  # KHUYẾN NGHỊ: Luôn bật (enabled: true), BB period 10
  fast_range:
    enabled: true            # ✅ Nên bật
    bb_period: 10            # 10 nến (vs 20 mặc định)
    adx_period: 14
    sideways_adx_max: 20.0   # ADX < 20 = sideways
    stabilization_min: 3     # Chờ 3 period sau breakout
    enable_adx_filter: true

  # ===========================================================================
  # ADX FILTER - Chỉ trade khi thực sự sideways
  # ===========================================================================
  # ADX (Average Directional Index):
  #   ADX < 20: Sideways (tốt cho grid)
  #   ADX > 25: Trending (nguy hiểm cho grid)
  #
  # ĐIỀU CHỈNH sideways_adx_max:
  #   15-18: Rất chặt, chỉ trade chắc chắn sideways
  #   20-25: Balance (khuyến nghị)
  #   25-30: Dễ dãi, có thể bắt đầu trend nhẹ
  #
  # KHUYẾN NGHỊ: 20.0
  adx_filter:
    enabled: true            # ✅ Nên bật
    adx_period: 14
    sideways_adx_max: 20.0   # Chỉ trade khi ADX < 20

  # ===========================================================================
  # DYNAMIC LEVERAGE - Đòn bẩy thay đổi theo điều kiện
  # ===========================================================================
  # Tự động điều chỉnh leverage dựa trên ATR/ADX/BB Width
  #
  # LOGIC:
  #   Sideways chặt (ATR thấp) → Max leverage (100x)
  #   Trending (ATR cao)      → Min leverage (10x)
  #
  # TRADE-OFF:
  #   enabled: true  → Tối ưu leverage, nhưng phức tạp
  #   enabled: false → Đơn giản, leverage cố định
  #
  # KHUYẾN NGHỊ: Người mới để false
  dynamic_leverage:
    enabled: true            # BẬT để dùng leverage theo BB/ADX runtime
    base_leverage: 50.0
    min_leverage: 10.0
    max_leverage: 100.0
    atr_threshold_high: 1.5
    atr_threshold_low: 0.8
    adx_threshold_trending: 30.0
    bb_width_threshold_tight: 0.005

  # ===========================================================================
  # MULTI-LAYER LIQUIDATION - Bảo vệ 4 lớp trước liquidation
  # ===========================================================================
  # 4 tiers thay vì chỉ 1 ngưỡng:
  #   Tier 1 (50%): Cảnh báo
  #   Tier 2 (30%): Giảm 50% position
  #   Tier 3 (15%): Đóng tất cả
  #   Tier 4 (10%): Emergency hedge
  #
  # TRADE-OFF:
  #   enabled: true  → Bảo vệ tối đa, nhưng có thể đóng sớm
  #   enabled: false → Chỉ 1 cơ hội trước liquidation
  #
  # KHUYẾN NGHỊ: Bật true cho production
  multi_layer_liquidation:
    enabled: true            # BẬT cho production
    layer1_warn_pct: 0.50    # Tier 1: 50% distance
    layer2_reduce_pct: 0.30  # Tier 2: 30% distance
    layer3_close_pct: 0.15   # Tier 3: 15% distance
    layer4_hedge_pct: 0.10   # Tier 4: 10% distance
    reduce_position_by: 0.50 # Giảm 50% ở Tier 2

  # ===========================================================================
  # MICRO PARTIAL CLOSE - Chốt lời 4 mức micro (8-40 bps)
  # ===========================================================================
  # Thay vì 3 TP levels như cũ, có 4 levels micro:
  #   TP1: 8 bps  → Close 25%
  #   TP2: 15 bps → Close 25%
  #   TP3: 25 bps → Close 25%
  #   TP4: 40 bps → Close 25% + Trailing
  #
  # LỢI ÍCH: Chốt lời nhanh (8 bps đã cover phí), nhiều lần chốt lời
  #
  # KHUYẾN NGHỊ: Bật nếu dùng micro_grid
  micro_partial_close:
    enabled: false           # Bật nếu dùng micro_grid
    tp_levels:
      - target_pct: 0.0008   # TP1: 8 bps
        close_pct: 0.25
      - target_pct: 0.0015     # TP2: 15 bps
        close_pct: 0.25
      - target_pct: 0.0025    # TP3: 25 bps
        close_pct: 0.25
      - target_pct: 0.0040     # TP4: 40 bps
        close_pct: 0.25
    trailing_after_tp3: true
    trailing_distance: 0.001

# =============================================================================
# HƯỚNG DẪN TỐI ƯU THEO MỤC TIÊU
# =============================================================================
#
# MỤC TIÊU 1: Tối đa VOLUME (Farming Points) ⚡
# ────────────────────────────────────────────
# Ưu tiên: Nhiều fill nhất, volume cao nhất, profit micro
#
# Config đề xuất:
# optimization:
#   micro_grid: { enabled: true, spread_pct: 0.0005, orders_per_side: 7, order_size_usdt: 3.0 }
#   fast_range: { enabled: true, bb_period: 10 }
#   adx_filter: { enabled: true, sideways_adx_max: 20 }
# volume_farming:
#   order_size_usdt: 3
#   grid_spread_pct: 0.0005
#   max_orders_per_side: 7
#   replace_immediately: true
# risk:
#   max_position_usdt_per_symbol: 100
#   max_consecutive_losses: 5
#
# Kết quả dự kiến:
# - Volume: ~$15,000-20,000/ngày
# - Win rate: ~55-60%
# - Profit/fill: ~2-5 bps
# - Risk: HIGH (tight spread, high leverage)
#
# ⚠️ CHỈ DÙNG KHI: Capital đủ lớn, chịu được drawdown 20-30%
#
# MỤC TIÊU 2: Tối đa PROFIT (Risk cao hơn) 💰
# ────────────────────────────────────────────
# Ưu tiên: Profit/fill cao, leverage tối ưu
#
# Config đề xuất:
# optimization:
#   micro_grid: { enabled: false }
#   dynamic_leverage: { enabled: true, base_leverage: 50 }
#   multi_layer_liquidation: { enabled: true }
# volume_farming:
#   order_size_usdt: 15
#   grid_spread_pct: 0.002
#   max_orders_per_side: 8
#   partial_close: { enabled: true }
# risk:
#   max_position_usdt_per_symbol: 300
#   stop_loss_pct: 0.02
#   take_profit_rratio: 2.0
#
# Kết quả dự kiến:
# - Volume: ~$8,000-12,000/ngày
# - Win rate: ~60-65%
# - Profit/fill: ~10-20 bps
# - Risk: MEDIUM-HIGH
#
# ⚠️ CHỈ DÙNG KHI: Hiểu rõ risk management, chịu được drawdown 15-20%
#
# MỤC TIÊU 3: AN TOÀN (Risk thấp) 🛡️
# ─────────────────────────────────────────
# Ưu tiên: Risk thấp, drawdown nhỏ, ổn định
#
# Config đề xuất:
# optimization:
#   micro_grid: { enabled: false }
#   adx_filter: { enabled: true, sideways_adx_max: 15 }
#   multi_layer_liquidation: { enabled: true, layer3_close_pct: 0.20 }
#   dynamic_leverage: { enabled: false }
# volume_farming:
#   order_size_usdt: 5
#   grid_spread_pct: 0.002
#   max_orders_per_side: 5
#   max_daily_loss_usdt: 2
# risk:
#   max_position_usdt_per_symbol: 100
#   max_consecutive_losses: 2
#   cooldown_duration: 60s
#   liquidation_buffer_pct: 0.50
#
# Kết quả dự kiến:
# - Volume: ~$5,000-8,000/ngày
# - Win rate: ~65-70%
# - Profit/fill: ~5-10 bps
# - Risk: LOW-MEDIUM
#
# ✅ KHUYẾN NGHỊ CHO NGƯỜI MỚI: Bắt đầu với mục tiêu này
#
# MỤC TIÊU 4: BALANCE (Cân bằng) ⚖️
# ──────────────────────────────────────
# Ưu tiên: Balance giữa volume, profit, và risk
#
# Config đề xuất (HIỆN TẠI):
# optimization:
#   micro_grid: { enabled: true, spread_pct: 0.0005, orders_per_side: 5, order_size_usdt: 3.0 }
#   fast_range: { enabled: true, bb_period: 10 }
#   adx_filter: { enabled: true, sideways_adx_max: 20 }
#   dynamic_leverage: { enabled: true, base_leverage: 50 }
#   multi_layer_liquidation: { enabled: true }
# volume_farming:
#   order_size_usdt: 20.5
#   grid_spread_pct: 0.0015
#   max_orders_per_side: 10
#   max_daily_loss_usdt: 3
# risk:
#   max_position_usdt_per_symbol: 300
#   max_consecutive_losses: 3
#   cooldown_duration: 30s
#   liquidation_buffer_pct: 0.35
#
# Kết quả dự kiến:
# - Volume: ~$10,000-15,000/ngày
# - Win rate: ~60-65%
# - Profit/fill: ~5-10 bps
# - Risk: MEDIUM
#
# ✅ KHUYẾN NGHỊ CHO PRODUCTION: Cân bằng tốt nhất
#
# =============================================================================
# =============================================================================
# VOLUME FARMING OPTIMIZATION - Tối ưu hóa volume farming
# =============================================================================
# Các cải tiến để tăng hiệu quả volume farming và giảm rủi ro
# =============================================================================
volume_farming_optimization:
  enabled: true

  # Order Priority - Ưu tiên thứ tự lệnh
  # ====================================
  order_priority:
    tick_size_awareness:
      enabled: true
      tick_sizes:
        BTCUSD1: 0.1
        ETHUSD1: 0.01
        SOLUSD1: 0.001
        XRPUSD1: 0.0001
        DOGEUSD1: 0.00001
      default_tick_size: 0.01
    penny_jumping:
      enabled: false  # Phase 3 - cần backtesting
      jump_threshold: 0.1  # 10% của spread
      max_jump: 3  # Max 3 ticks

  # Toxic Flow Detection - Phát hiện dòng chảy độc hại
  # ===================================================
  toxic_flow_detection:
    enabled: true
    window_size: 50  # Số buckets
    bucket_size: 1000.0  # Volume mỗi bucket (USDT)
    vpin_threshold: 0.3  # Ngưỡng VPIN (0-1)
    sustained_breaches: 2  # Số breach liên tiếp
    action: "pause"  # pause, widen_spread, reduce_size
    auto_resume_delay: 5s  # Thời gian auto-resume

  # Maker/Taker Optimization - Tối ưu phí maker/taker
  # ==================================================
  maker_taker_optimization:
    post_only_enabled: true  # Luôn dùng post-only flag
    post_only_fallback: true  # Fallback nếu post-only reject
    smart_cancellation:
      enabled: true
      spread_change_threshold: 0.2  # 20% spread change
      check_interval: 5s  # Kiểm tra mỗi 5s

  # Inventory Hedging - Quản lý inventory (Phase 3)
  # ================================================
  inventory_hedging:
    enabled: false  # Phase 3
    hedge_threshold: 0.3  # 30% inventory trigger
    hedge_ratio: 0.3  # Hedge 30% của position
    max_hedge_size: 100.0  # Max 100 USDT
    hedging_mode: "internal"  # internal, cross_pair, scalping
    hedge_pair: "ETH"  # Hedge pair cho cross-pair mode

# =============================================================================
# QUICK REFERENCE - CÁC CONFIG QUAN TRỌNG NHẤT
# =============================================================================
#
# 1. NẾU MUỐN TĂNG VOLUME:
#    - Tăng max_orders_per_side (5 → 10)
#    - Giảm grid_spread_pct (0.002 → 0.0005)
#    - Bật optimization.micro_grid
#    - Giảm order_size_usdt (20 → 3)
#
# 2. NẾU MUỐN TĂNG PROFIT:
#    - Tăng grid_spread_pct (0.0015 → 0.002)
#    - Tăng order_size_usdt (3 → 15)
#    - Bật optimization.dynamic_leverage
#    - Tăng take_profit_rratio (1.5 → 2.0)
#
# 3. NẾU MUỐN GIẢM RISK:
#    - Giảm max_position_usdt_per_symbol (300 → 100)
#    - Tăng liquidation_buffer_pct (0.35 → 0.50)
#    - Giảm max_consecutive_losses (3 → 2)
#    - Tăng cooldown_duration (30s → 60s)
#    - Giảm adx_filter.sideways_adx_max (20 → 15)
#
# 4. NẾU MARGIN INSUFFICIENT:
#    - Giảm order_size_usdt (20 → 5)
#    - Giảm max_orders_per_side (10 → 5)
#    - Giảm max_position_usdt_per_symbol (300 → 100)
#    - Tắt optimization.dynamic_leverage
#
# 5. NẾU BỊ LIQUIDATION:
#    - Tăng liquidation_buffer_pct (0.35 → 0.50)
#    - Giảm leverage (dynamic_leverage.base_leverage: 50 → 20)
#    - Giảm order_size_usdt (20 → 5)
#    - Bật optimization.multi_layer_liquidation
#
# =============================================================================
# CHECKLIST TRƯỚC KHI CHẠY PRODUCTION
# =============================================================================
#
# [ ] Bot đã test với dry_run: true
# [ ] Margin đủ cho max_position_usdt_per_symbol
# [ ] API key có quyền futures trading
# [ ] Config đã backup
# [ ] Monitoring đã setup (logs, alerts)
# [ ] Stop-loss đã test
# [ ] Circuit breakers đã test
# [ ] Risk limits đã review
# [ ] Trading hours đã config
# [ ] Whitelist đã verify
#
# =============================================================================
