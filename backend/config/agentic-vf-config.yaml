# =============================================================================
# AGENTIC + VOLUME FARM UNIFIED CONFIGURATION
# =============================================================================
#
# Đây là config kết hợp cho cả 2 layer:
# - Agentic (Decision Layer): Chọn symbols dựa trên regime detection
# - Volume Farm (Execution Layer): Thực hiện grid trading
#
# Cấu trúc:
# 1. agentic: Cấu hình cho decision layer
# 2. volume_farming: Cấu hình cho execution layer (giữ nguyên từ volume-farm-config.yaml)
# =============================================================================

bot:
  dry_run: false

# =============================================================================
# AGENTIC DECISION LAYER
# =============================================================================
agentic:
  enabled: true
  
  # Symbol universe - các cặp agentic sẽ theo dõi và đánh giá
  universe:
    symbols:
      - BTCUSD1
      - ETHUSD1
      - SOLUSD1
      - LINKUSD1
      - DOGEUSD1
      - XRPUSD1
      - ADAUSD1
      - AVAXUSD1
      - MATICUSD1
      - DOTUSD1
    
    # Hoặc auto-discover từ top volume
    auto_discover: false
    top_volume_count: 20
    min_24h_volume_usd: 10000000  # $10M
  
  # Regime Detection Settings
  regime_detection:
    update_interval: 30s
    adx_period: 14
    bb_period: 20
    atr_period: 14
    candle_interval: 5m
    
    thresholds:
      sideways_adx_max: 25
      trending_adx_min: 25
      volatile_atr_spike: 3.0
  
  # Scoring Weights
  scoring:
    weights:
      trend: 0.30
      volatility: 0.25
      volume: 0.25
      structure: 0.20
    
    thresholds:
      high_score: 75      # Deploy full
      medium_score: 60    # Deploy reduced
      low_score: 40       # Monitor only
      skip_score: 0       # Skip
  
  # Position Sizing per Regime
  position_sizing:
    score_multipliers:
      HIGH: 1.0
      MEDIUM: 0.6
      LOW: 0.3
    
    regime_multipliers:
      SIDEWAYS: 1.0     # Grid hoạt động tốt
      TRENDING: 0.7     # Giảm size vì rủi ro
      VOLATILE: 0.5     # Giảm nhiều hơn
      RECOVERY: 0.8     # Cẩn trọng
  
  # Whitelist Management
  whitelist_management:
    max_symbols: 5              # Tối đa symbols trong whitelist
    min_score_to_add: 60        # Score tối thiểu để thêm vào whitelist
    score_to_remove: 35         # Score dưới này thì remove
    keep_if_position_open: true # Giữ symbol nếu đang có position
    replace_immediately: true   # Thay thế ngay khi có symbol tốt hơn
  
  # Circuit Breakers (override VF breakers nếu cần)
  circuit_breakers:
    volatility_spike:
      enabled: true
      atr_multiplier: 3.0
    
    consecutive_losses:
      enabled: true
      threshold: 3
      size_reduction: 0.5

# =============================================================================
# VOLUME FARMING EXECUTION LAYER
# =============================================================================
# (Giữ nguyên cấu hình từ volume-farm-config.yaml)

volume_farming:
  enabled: true

  max_daily_loss_usdt: 3
  max_total_drawdown_pct: 50.0
  order_size_usdt: 20.5
  grid_spread_pct: 0.0015
  max_orders_per_side: 10
  max_global_pending_limit_orders: 30
  max_pending_per_side: 15
  replace_immediately: true
  position_timeout_minutes: 5

  ticker_stream: "!ticker@arr"
  symbol_refresh_interval_seconds: 60
  grid_placement_cooldown_seconds: 0
  rate_limit_cooldown_seconds: 3
  rate_limiter_capacity: 200
  rate_limiter_refill_rate: 5.0

  supported_quote_currencies: ["USD1"]
  min_volume_24h: 1000

  # Symbol Selection - CHỈ USD1
  symbols:
    auto_discover: false
    quote_currency_mode: "USD1"
    supported_quote_currencies: ["USD1"]
    quote_currencies: ["USD1"]
    allow_mixed_quotes: false
    min_volume_24h: 1000
    max_spread_pct: 5.0
    boosted_only: false
    max_symbols_per_quote: 1
    spread_ranking: true
    volume_weighting: 0.5
    min_liquidity_score: 0.7
    optimal_spread_range: [0.0, 0.5]
    spread_volatility_threshold: 0.1
    exclude_high_fee_symbols: true
    
    # Whitelist sẽ được agentic quản lý động
    # Nếu agentic.enabled = true, whitelist này sẽ bị override
    whitelist: ["ETHUSD1"]
    blacklist: []

  # Exchange Configuration
  exchange:
    api_key: "${ASTER_API_KEY}"
    futures_rest_base: "https://fapi.asterdex.com"
    futures_ws_base: "wss://fstream.asterdex.com"
    recv_window: 5000
    requests_per_second: 5

  # Funding Rate Awareness
  funding_rate:
    enabled: true
    high_threshold: 0.001
    extreme_threshold: 0.005
    bias_strength: 0.7
    skip_threshold: 0.01
    check_interval_minutes: 5

  # Dynamic Grid Spread
  dynamic_grid:
    enabled: true
    base_spread_pct: 0.0015
    low_atr_threshold: 0.3
    normal_atr_threshold: 0.8
    high_atr_threshold: 1.5
    low_multiplier: 0.8
    normal_multiplier: 1.0
    high_multiplier: 1.5
    extreme_multiplier: 2.0
    atr_period: 7

  # Smart Position Sizing
  smart_sizing:
    enabled: true
    kelly_fraction: 0.25
    consecutive_loss_decay: 0.8
    min_size: 5.0
    max_size: 100.0
    window_hours: 24

  # Partial Close Strategy
  partial_close:
    enabled: true
    tp1:
      close_pct: 0.30
      profit_pct: 0.005
    tp2:
      close_pct: 0.40
      profit_pct: 0.01
    tp3:
      close_pct: 0.30
      profit_pct: 0.015
    trailing_after_tp2: true
    trailing_distance: 0.005

  # Risk Management
  risk:
    max_position_usdt_per_symbol: 300
    max_total_positions_usdt: 500
    daily_loss_limit_usdt: 3
    daily_drawdown_pct: 50.0
    max_open_positions: 3
    max_global_pending_limit_orders: 30
    max_pending_per_side: 15
    per_trade_stop_loss_pct: 2.0
    per_trade_take_profit_pct: 1.0
    take_profit_rratio: 1.5
    min_take_profit_pct: 0.5
    max_take_profit_pct: 2.0
    risk_per_trade_usdt: 2.0
    atr_multiplier: 2.0
    position_mode: "one_way"
    correlation_threshold: 0.8
    maker_priority: true

# =============================================================================
# API & LOGGING
# =============================================================================
api:
  host: "0.0.0.0"
  port: 8081

log:
  level: "info"
  file: "logs/agentic-vf.log"
