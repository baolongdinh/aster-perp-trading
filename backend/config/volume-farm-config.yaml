# Volume Farming Bot Configuration
# This config is specifically for volume farming operations

# Volume Farming Settings
enabled: true
max_daily_loss_usdt: 50
max_total_drawdown_pct: 5.0
order_size_usdt: 100
grid_spread_pct: 0.05
max_orders_per_side: 2
replace_immediately: true
position_timeout_minutes: 30

# Symbol Selection & Management
symbols:
  auto_discover: true
  quote_currency_mode: "flexible"  # "USDT" | "USD1" | "flexible" | "all"
  min_volume_24h: 10000000  # Minimum $10M daily volume
  max_spread_pct: 0.1  # Maximum spread 0.1%
  boosted_only: false  # Prioritize boosted symbols
  max_symbols_per_quote: 10  # Max 10 symbols per quote currency
  spread_ranking: true  # Rank by lowest spread first
  volume_weighting: 0.7  # 70% weight to volume, 30% to spread
  min_liquidity_score: 0.5  # Minimum liquidity score (0-1)
  optimal_spread_range: [0.01, 0.05]  # Prefer 0.01% - 0.05% spread
  spread_volatility_threshold: 0.02  # Max spread change 0.02% in 5min
  exclude_high_fee_symbols: true  # Exclude symbols with unusual fee structures
  quote_currencies: ["USDT", "USD1"]  # Available quote currencies
  allow_mixed_quotes: true  # Allow mixing USDT and USD1 pairs
  whitelist: []  # Optional whitelist - empty means auto-discover

# Exchange Configuration (reuse from main config)
exchange:
  api_key: "${ASTER_API_KEY}"
  futures_rest_base: "https://fapi.asterdex.com"
  futures_ws_base: "wss://fstream.asterdex.com"
  recv_window: 5000
  requests_per_second: 10

# Risk Management (reuse from main config but with farming-specific limits)
risk:
  max_position_usdt_per_symbol: 500
  max_total_positions_usdt: 2000
  fee_loss_threshold_pct: 0.1
  position_timeout_minutes: 30
  max_daily_loss_usdt: 50
  daily_drawdown_pct: 5.0
  max_open_positions: 10
  max_trades_per_symbol: 100
  max_global_pending_limit_orders: 20
  max_pending_per_side: 5
  per_trade_stop_loss_pct: 2.0
  per_trade_take_profit_pct: 1.0
  risk_per_trade_usdt: 10.0
  atr_multiplier: 2.0
  position_mode: "one_way"
  correlation_threshold: 0.8
  maker_priority: true

# API Server Configuration (different port from main bot)
api:
  host: "0.0.0.0"
  port: 8081  # Different from main bot (8080)
  enable_metrics: true

# Logging Configuration
log:
  level: "info"
  format: "json"
