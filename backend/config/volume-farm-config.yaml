# =============================================================================
# VOLUME FARMING BOT CONFIGURATION - OPTIMIZED FOR $10 CAPITAL + HIGH LEVERAGE
# =============================================================================
#
# ⚠️  CONFIG CHO VỐN NHỎ ($10) + LEVERAGE CAO (20x-50x)
# =============================================================================
#
# MỤC ĐÍCH:
#   - Farm volume với vốn siêu nhỏ ($10)
#   - Tận dụng leverage cao để tăng position size
#   - Vào-ra nhanh, không giữ position lâu (tránh liq)
#   - 100% limit order (tối ưu phí)
#
# RỦI RO:
#   - Leverage cao = liquidation risk cao
#   - Chỉ dùng vốn bạn sẵn sàng mất 100%
#   - Không dùng vốn vay hoặc chi tiêu cần thiết
#
# CÁCH TÍNH MARGIN VỚI LEVERAGE:
#   Vốn: $10 | Leverage: 20x | Order: $3
#   → Margin cần: $3 / 20 = $0.15
#   → Buffer an toàn: 10 lệnh = $1.5 margin
# =============================================================================

bot:
  dry_run: false

# ---------------------------------------------------------------------------
# VOLUME FARMING SETTINGS - Cấu hình cho $10 vốn
# ---------------------------------------------------------------------------
enabled: true

# max_daily_loss_usdt: Giới hạn lỗ tối đa mỗi ngày
# Với $10 vốn, 30% = $3 (cho phép nhiều lần thua liên tiếp)
max_daily_loss_usdt: 3

# max_total_drawdown_pct: Drawdown tối đa
# Dừng bot nếu drawdown 50% vốn ($5) - bảo vệ vốn còn lại
max_total_drawdown_pct: 50.0

# order_size_usdt: Kích thước mỗi lệnh
# $30 notional với 100x leverage chỉ cần $0.30 margin
# Tăng size để farm nhiều volume hơn
order_size_usdt: 30

# grid_spread_pct: Spread giữa các lệnh
# 0.15% = chặt hơn, fill nhanh hơn, nhiều volume hơn
# Lãi ~0.05% sau phí (0.05% maker × 2)
grid_spread_pct: 0.0015

# max_orders_per_side: Số lệnh tối đa mỗi bên
# TĂNG LÊN: 10 lệnh mỗi bên = 20 lệnh total
# Nhiều lệnh = nhiều cơ hội fill = nhiều volume hơn
max_orders_per_side: 10

# max_global_pending_limit_orders: Tổng số lệnh pending
# 20 lệnh = $600 notional, với 100x leverage = $6 margin (60% vốn)
max_global_pending_limit_orders: 20

# max_pending_per_side: Số lệnh pending mỗi bên
max_pending_per_side: 10

# replace_immediately: Đặt lại lệnh ngay sau khi fill
# true = luôn có lệnh trên sách, tăng tần suất giao dịch
replace_immediately: true

# position_timeout_minutes: Thời gian tối đa giữ position
# GIẢM: 5 phút = đóng position nếu không đạt TP/SL
# Không để position treo quá lâu (tránh funding rate, tránh liq)
position_timeout_minutes: 5

# Ticker và symbol refresh
# ticker_stream: WebSocket stream để nhận giá real-time
ticker_stream: "!ticker@arr"

# symbol_refresh_interval_seconds: Tần suất refresh symbols
# Chỉ chạy 1 symbol duy nhất để tập trung margin
symbol_refresh_interval_seconds: 60

# grid_placement_cooldown_seconds: Thời gian chờ giữa các lần đặt lệnh
# 0.2s = đặt lại ngay khi có thể, không bỏ lỡ cơ hội
grid_placement_cooldown_seconds: 0

# Rate limiter - TĂNG capacity, giảm tốc độ để tránh timeout
rate_limit_cooldown_seconds: 3
rate_limiter_capacity: 200
rate_limiter_refill_rate: 5.0  # Chậm hơn = ít timeout hơn

# Supported quote currencies
supported_quote_currencies: ["USD1"]

# min_volume_24h: Chỉ chọn symbol thanh khoản cao (dễ fill)
min_volume_24h: 1000

# ---------------------------------------------------------------------------
# SYMBOL SELECTION - CHỈ CHẠY USD1 (KHÔNG PHẢI USDT)
# ---------------------------------------------------------------------------
symbols:
  auto_discover: false  # TẮT HOÀN TOÀN auto discover
  
  # Quote currency CHỈ USD1 - không USDT
  quote_currency_mode: "USD1"
  supported_quote_currencies: ["USD1"]
  quote_currencies: ["USD1"]
  allow_mixed_quotes: false
  
  min_volume_24h: 1000
  max_spread_pct: 5.0
  boosted_only: false
  max_symbols_per_quote: 1
  spread_ranking: true
  volume_weighting: 0.5
  min_liquidity_score: 0.7
  optimal_spread_range: [0.0, 0.5]
  spread_volatility_threshold: 0.1
  exclude_high_fee_symbols: true
  
  # WHITELIST CHỈ USD1: ETHUSD1 hoặc BTCUSD1 (nếu đủ leverage)
  # LƯU Ý: Symbol PHẢI kết thúc bằng USD1
  whitelist: ["ETHUSD1"]
  blacklist: []  # Không cần blacklist vì whitelist đã giới hạn

# ---------------------------------------------------------------------------
# EXCHANGE CONFIGURATION
# ---------------------------------------------------------------------------
exchange:
  api_key: "${ASTER_API_KEY}"  # API key từ environment variable
  futures_rest_base: "https://fapi.asterdex.com"
  futures_ws_base: "wss://fstream.asterdex.com"
  recv_window: 5000  # Receive window (ms) - không nên quá nhỏ
  requests_per_second: 5  # Giảm xuống 5 để tránh rate limit timeout

# ---------------------------------------------------------------------------
# RISK MANAGEMENT - SIÊU CHẶT CHO VỐN NHỎ
# ---------------------------------------------------------------------------
risk:
  # max_position_usdt_per_symbol: Giới hạn position/symbol
  # $300 = 30x vốn, với 100x leverage = $3 margin
  # Cho phép nhiều lệnh chồng lên nhau để farm volume
  max_position_usdt_per_symbol: 300

  # max_total_positions_usdt: Tổng position tối đa
  # $300 notional với 100x leverage = $3 margin
  max_total_positions_usdt: 900

  # fee_loss_threshold_pct: Ngưỡng lỗ do phí (%)
  fee_loss_threshold_pct: 0.1

  position_timeout_minutes: 3  # GIẢM: 3 phút (vào-ra siêu nhanh)
  max_daily_loss_usdt: 2       # GIẢM: 20% vốn
  daily_drawdown_pct: 50.0     # Dừng nếu drawdown 50%

  # max_open_positions: Số vị thế mở tối đa
  max_open_positions: 5  # Cho phép nhiều position để farm volume

  # max_trades_per_symbol: Tối đa 500 giao dịch/ngày
  max_trades_per_symbol: 500

  # max_global_pending_limit_orders: Tổng số lệnh pending tối đa
  max_global_pending_limit_orders: 20

  # max_pending_per_side: Số lệnh pending tối đa mỗi bên
  max_pending_per_side: 10

  # per_trade_stop_loss_pct: 0.5% (cho 50x-100x leverage)
  # Với leverage cao, SL rộng hơn một chút để tránh bị quét
  per_trade_stop_loss_pct: 0.5

  # per_trade_take_profit_pct: 0.3% (chặt cho high volume)
  # Chốt lời nhanh = nhiều giao dịch hơn = nhiều volume hơn
  per_trade_take_profit_pct: 0.3

  risk_per_trade_usdt: 1.5     # Rủi ro mỗi giao dịch tăng theo size
  atr_multiplier: 0.5             # Không dùng ATR cho vốn nhỏ
  position_mode: "one_way"        # Chế độ vị thế
  correlation_threshold: 1.0      # Không cần vì chỉ 1 symbol
  maker_priority: true            # Ưu tiên maker orders

# ---------------------------------------------------------------------------
# API SERVER CONFIGURATION
# ---------------------------------------------------------------------------
api:
  host: "0.0.0.0"
  port: 8081  # Khác với main bot (8080) để tránh conflict
  enable_metrics: true  # Bật metrics endpoint

# ---------------------------------------------------------------------------
# LOGGING CONFIGURATION
# ---------------------------------------------------------------------------
log:
  level: "info"   # debug/info/warn/error
  format: "json"  # json/text
