agent:
  enabled: true

  regime_detection:
    update_interval: 30s
    adx_period: 14
    bb_period: 20
    atr_period: 14

    thresholds:
      sideways_adx_max: 25
      trending_adx_min: 25
      volatile_atr_spike: 3.0

  factors:
    weights:
      trend: 0.30
      volatility: 0.25
      volume: 0.25
      structure: 0.20

    scoring:
      deploy_full_threshold: 75
      deploy_reduced_threshold: 60
      wait_threshold: 40

  position_sizing:
    score_multipliers:
      full: 1.0
      reduced: 0.5
      none: 0.0

    volatility_multipliers:
      normal: 1.0
      high: 0.5
      extreme: 0.0

    grid_spacing:
      low_vol: 0.003
      normal_vol: 0.01
      high_vol: 0.02

  circuit_breakers:
    volatility_spike:
      enabled: true
      atr_multiplier: 3.0
      window: 5m

    liquidity_crisis:
      enabled: true
      spread_multiplier: 5.0

    consecutive_losses:
      enabled: true
      threshold: 3
      size_reduction: 0.5

    drawdown_limit:
      enabled: true
      max_drawdown: 0.10

    connection_failure:
      enabled: true
      max_failures: 3

  patterns:
    enabled: true
    storage_path: "data/patterns"
    min_trades_to_activate: 200
    decay_half_life_days: 14
    max_impact_points: 5
    similarity_threshold: 0.8

  logging:
    retention_days: 90
    log_level: "info"
    log_decisions: true

  alerting:
    enabled: true
    webhook_url: ""
    on_regime_change: true
    on_circuit_breaker: true
    on_high_drawdown: true
    rate_limit_window: 5m
    # Telegram config via ENV vars:
    # TELEGRAM_BOT_TOKEN=your_bot_token
    # TELEGRAM_CHAT_ID=7373182316
    # TELEGRAM_ENABLED=true
