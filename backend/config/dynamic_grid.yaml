# =============================================================================
# DYNAMIC GRID CONFIGURATION
# Tự động điều chỉnh spread dựa trên ATR (Average True Range)
# =============================================================================
#
# MỤC ĐÍCH:
#   - Điều chỉnh tự động grid spacing theo biến động thị trường
#   - Khi volatile cao → grid rộng hơn để tránh bị hit liên tục
#   - Khi volatile thấp → grid hẹp hơn để tăng tần suất giao dịch
#
# TRADE-OFFS:
#   ┌─────────────────────────────────────────────────────────────────────┐
#   │ THAM SỐ           │ GIÁ TRỊ CAO              │ GIÁ TRỊ THẤP          │
#   ├─────────────────────────────────────────────────────────────────────┤
#   │ atr_period        │ Nhạy cảm cao (nhanh)     │ Nhạy cảm thấp (chậm)  │
#   │                   │ → Phản ứng nhanh với     │ → Ít false signal     │
#   │                   │   biến động              │ → Phản ứng chậm hơn   │
#   ├─────────────────────────────────────────────────────────────────────┤
#   │ base_spread_pct   │ Grid rộng                │ Grid hẹp              │
#   │                   │ → Ít bị hit, ít fee      → Nhiều giao dịch hơn   │
#   │                   │ → Ít profit              → Nhiều fee hơn        │
#   ├─────────────────────────────────────────────────────────────────────┤
#   │ spread_multipliers│ Multiplier cao           │ Multiplier thấp       │
#   │                   │ → Grid rộng hơn khi      │ → Grid hẹp hơn        │
#   │                   │   volatile               │ → Dễ bị hit khi       │
#   │                   │                          │   volatile            │
#   ├─────────────────────────────────────────────────────────────────────┤
#   │ min/max_levels    │ Nhiều levels             │ Ít levels             │
#   │                   │ → Nhiều lệnh hơn         → Ít lệnh hơn         │
#   │                   │ → Coverage tốt hơn       → Dễ quản lý hơn       │
#   └─────────────────────────────────────────────────────────────────────┘
#
# CÁC CHẾ ĐỘ GỢI Ý:
#   - SCALPING (high frequency): atr_period=7, base_spread=0.01%, max_levels=10
#   - BALANCED:                  atr_period=14, base_spread=0.02%, max_levels=7 (default)
#   - SWING (low frequency):     atr_period=21, base_spread=0.05%, max_levels=5
# =============================================================================

dynamic_grid:
  enabled: true  # true/false: Bật/tắt dynamic grid

  # ---------------------------------------------------------------------------
  # ATR CONFIGURATION
  # Cấu hình ATR để đo lường biến động
  # ---------------------------------------------------------------------------
  # atr_period: Số period để tính ATR
  #   - 7: Nhạy cảm cao, phản ứng nhanh (phù hợp scalping)
  #   - 14: Cân bằng (default cho hầu hết trường hợp)
  #   - 21: Ổn định hơn, ít whipsaw (phù hợp swing trading)
  atr_period: 7

  # atr_timeframe: Timeframe để tính ATR
  #   - "5m": Phản ứng rất nhanh (scalping)
  #   - "15m": Cân bằng (khuyến nghị)
  #   - "1h": Phản ứng chậm, ít false signal
  atr_timeframe: "1m"

  # ---------------------------------------------------------------------------
  # BASE SPREAD CONFIGURATION
  # Spread cơ bản khi không có biến động đặc biệt
  # ---------------------------------------------------------------------------
  # base_spread_pct: Spread mặc định (%)
  #   - 0.005% (0.5 bps): Grid rất chặt, nhiều giao dịch, nhiều fee
  #   - 0.01% (1 bps): Grid chặt, phù hợp volume farming
  #   - 0.02% (2 bps): Cân bằng (default)
  #   - 0.05% (5 bps): Grid rộng, ít giao dịch, ít fee
  base_spread_pct: 0.003

  # ---------------------------------------------------------------------------
  # SPREAD MULTIPLIERS THEO VOLATILITY LEVEL
  # Nhân spread theo mức độ biến động
  # ---------------------------------------------------------------------------
  spread_multipliers:
    # low_volatility: ATR < 0.3% - Grid hẹp hơn để tăng tần suất
    #   - 0.6-0.8: Thu hẹp grid khi thị trường yên ả
    #   - 1.0: Không thay đổi
    low_volatility: 0.8

    # normal: ATR 0.3-0.8% - Spread bình thường
    normal: 1.0

    # high_volatility: ATR 0.8-1.5% - Grid rộng hơn để tránh hit
    #   - 1.3-1.5: Tăng spread vừa phải
    #   - 1.8-2.0: Tăng spread nhiều (conservative)
    high_volatility: 1.3

    # extreme: ATR > 1.5% - Grid rất rộng hoặc tạm dừng
    #   - 1.8-2.0: Grid rộng nhưng vẫn trade
    #   - 2.5-3.0: Grid rất rộng (có thể nên tạm dừng)
    extreme: 2.0

  # ---------------------------------------------------------------------------
  # GRID LEVEL ADJUSTMENTS
  # Điều chỉnh số lượng levels theo spread multiplier
  # ---------------------------------------------------------------------------
  level_adjustments:
    # increase_threshold: Nếu multiplier < ngưỡng này → tăng số levels
    #   - 0.7: Tăng levels khi grid rất hẹp
    #   - 0.8: Tăng levels khi grid hẹp
    increase_threshold: 0.7

    # decrease_threshold: Nếu multiplier > ngưỡng này → giảm số levels
    #   - 1.5: Giảm levels khi grid rộng
    #   - 2.0: Chỉ giảm khi grid rất rộng
    decrease_threshold: 2.0

    # min_levels: Số levels tối thiểu mỗi bên (buy/sell)
    #   - 2-3: Ít lệnh, dễ quản lý
    #   - 5-7: Nhiều lệnh, coverage tốt
    min_levels: 10

    # max_levels: Số levels tối đa mỗi bên
    #   - 7-10: Nhiều coverage, phức tạp hơn
    #   - 10-15: Rất nhiều lệnh, cần quản lý vốn tốt
    max_levels: 30

  # ---------------------------------------------------------------------------
  # ATR THRESHOLDS (%)
  # Ngưỡng để phân loại volatility level
  # ---------------------------------------------------------------------------
  atr_thresholds:
    # low: ATR < ngưỡng này = low volatility
    #   - 0.2%: Rất nhạy, ít khi vào low volatility
    #   - 0.3%: Cân bằng (default)
    low: 0.3

    # normal: ATR từ low đến ngưỡng này = normal
    normal: 0.8

    # high: ATR từ normal đến ngưỡng này = high
    #   - 1.2%: Conservative
    #   - 1.5%: Cân bằng (default)
    high: 1.5
    # ATR > high = extreme

  # ---------------------------------------------------------------------------
  # UPDATE SETTINGS
  # Tần suất cập nhật grid
  # ---------------------------------------------------------------------------
  # update_interval: Khoảng thời gian cập nhật ATR
  #   - 1m/5m: Cập nhật thường xuyên (scalping)
  #   - 15m: Cân bằng (default)
  #   - 30m/1h: Cập nhật ít thường xuyên (ít thay đổi grid)
  update_interval: 1m

  # price_change_threshold: % thay đổi giá để cập nhật ngay lập tức
  #   - 0.3%: Nhạy cảm cao
  #   - 0.5%: Cân bằng (default)
  #   - 1.0%: Ít nhạy cảm
  price_change_threshold: 0.5

  # ---------------------------------------------------------------------------
  # LOGGING
  # ---------------------------------------------------------------------------
  log_volatility_changes: true  # true/false: Log khi volatility level thay đổi
  log_interval: 15m             # 5m/15m/30m/1h: Tần suất log status
