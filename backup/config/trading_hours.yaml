# Time-Based Trading Configuration for Grid Trading Bot
# Đặt tại: backend/config/trading_hours.yaml
# 
# HƯỚNG DẪN:
# - mode: "all" | "none" | "select" 
#   + all: Trade 24/7 không filter
#   + none: Không trade gì cả (tắt hoàn toàn)
#   + select: Chỉ trade các khung giờ được chọn
#
# - Mỗi slot có thể cấu hình:
#   + enabled: true/false - có trade không
#   + size_multiplier: 0.0-2.0 - hệ số giảm/tăng size
#   + max_exposure_pct: giới hạn exposure riêng cho khung giờ
#   + spread_multiplier: tăng/giảm spread (1.0 = normal)

mode: "select"  # all | none | select
timezone: "Asia/Ho_Chi_Minh"  # Múi giờ VN
default_size_multiplier: 1.0
default_max_exposure_pct: 0.3

# CÁC KHUNG GIỜ THEO PHIÊN (Giờ Việt Nam GMT+7)
slots:
  # =====================================================
  # PHIÊN Á - Thấp điểm (07:00 - 12:00)
  # =====================================================
  - window:
      start: "07:00"
      end: "12:00"
      timezone: "Asia/Ho_Chi_Minh"
    enabled: true
    size_multiplier: 1.0        # Full size - thị trường yên ả nhất
    max_exposure_pct: 0.3     # Max 30% equity
    spread_multiplier: 1.0    # Spread bình thường
    description: "Phiên Á - Thấp điểm (Lý tưởng cho Grid)"
    # Lý do: Thị trường Châu Á thường sideway, biến động thấp
    # → Grid hoạt động tốt nhất, có thể vào size lớn

  # =====================================================
  # NGHỈ TRƯA - Không trade (12:00 - 13:00)
  # =====================================================
  - window:
      start: "12:00"
      end: "13:00"
      timezone: "Asia/Ho_Chi_Minh"
    enabled: false
    size_multiplier: 0.0
    description: "Nghỉ trưa - Thanh khoản thấp, không rõ xu hướng"
    # Lý do: Giữa phiên Á và Âu, thanh khoản giảm, dễ bị whipsaw

  # =====================================================
  # PHIÊN ÂU - Trung bình (13:00 - 18:00)
  # =====================================================
  - window:
      start: "13:00"
      end: "18:00"
      timezone: "Asia/Ho_Chi_Minh"
    enabled: true
    size_multiplier: 0.7        # Giảm 30% - biến động tăng
    max_exposure_pct: 0.25      # Giảm exposure
    spread_multiplier: 1.3      # Tăng spread 30%
    description: "Phiên Âu - Trung bình (Cẩn trọng)"
    # Lý do: London, Frankfurt vào cuộc, biến động tăng dần
    # → Giảm size, tăng spread để tránh bị hit

  # =====================================================
  # CHUẨN BỊ PHIÊN MỸ - Không trade (18:00 - 19:00)
  # =====================================================
  - window:
      start: "18:00"
      end: "19:00"
      timezone: "Asia/Ho_Chi_Minh"
    enabled: false
    size_multiplier: 0.0
    description: "Chuẩn bị phiên Mỹ - Nghỉ ngơi"
    # Lý do: Chờ động thái từ phiên Mỹ, không nên vào lệnh trước tin tức

  # =====================================================
  # PHIÊN MỸ - Cao điểm (19:00 - 23:00)
  # =====================================================
  - window:
      start: "19:00"
      end: "23:00"
      timezone: "Asia/Ho_Chi_Minh"
    enabled: true
    size_multiplier: 0.3        # Giảm 70% - rất nguy hiểm
    max_exposure_pct: 0.15      # Chỉ 15% max exposure
    spread_multiplier: 2.0      # Tăng gấp đôi spread
    description: "Phiên Mỹ - Cao điểm (VERY HIGH RISK)"
    # Lý do: 
    # - NYSE mở cửa, quỹ lớn giải ngân
    # - Tin tức quan trọng (CPI, FOMC, Non-farm) thường 19:30-20:30
    # - Giá trending mạnh, dễ thủng grid
    # → Chỉ trade nhỏ giọt, spread rộng, exposure tối thiểu

  # =====================================================
  # ĐÓNG CỬA PHIÊN MỸ - Không trade (23:00 - 01:00)
  # =====================================================
  - window:
      start: "23:00"
      end: "01:00"
      timezone: "Asia/Ho_Chi_Minh"
    enabled: false
    size_multiplier: 0.0
    description: "Đóng cửa - Chờ ngày mới"
    # Lý do: Thanh khoản giảm mạnh sau khi Mỹ đóng cửa

  # =====================================================
  # PHIÊN KHUYA - Trung bình thấp (01:00 - 07:00)
  # =====================================================
  - window:
      start: "01:00"
      end: "07:00"
      timezone: "Asia/Ho_Chi_Minh"
    enabled: true
    size_multiplier: 0.8        # Giảm 20% - yên ả nhưng cẩn trọng
    max_exposure_pct: 0.25
    spread_multiplier: 1.2
    description: "Phiên khuya - Trung bình thấp"
    # Lý do: Biến động giảm, nhưng thanh khoản thấp, dễ bị hunt SL

---

# VÍ DỤ CÁC CẤU HÌNH KHÁC (Comment/uncomment để sử dụng)

