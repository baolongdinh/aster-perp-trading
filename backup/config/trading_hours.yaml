---

# GHI CHÚ QUAN TRỌNG:
#
# 1. Timezone hỗ trợ:
#    - "Asia/Ho_Chi_Minh" (GMT+7, VN time)
#    - "UTC" (GMT+0)
#    - "America/New_York" (GMT-4/-5, US time)
#    - "Europe/London" (GMT+1, London time)
#
# 2. Có thể hot-reload config mà không cần restart bot
#    → Gọi InitializeTimeFilter(config) để reload
#
# 3. Size multiplier:
#    - 1.0 = 100% (full size)
#    - 0.5 = 50% (giảm một nửa)
#    - 0.0 = 0% (không trade)
#
# 4. Spread multiplier:
#    - 1.0 = spread bình thường
#    - 2.0 = tăng gấp đôi (an toàn hơn trong volatile)
#
# 5. Lưu ý về overnight slots:
#    - Hỗ trợ slot qua đêm (ví dụ: 23:00 - 01:00)
#    - Code sẽ tự động handle đúng
